<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财报铁鹰阵法看板 V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200 min-h-screen">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                    🐉 财报铁鹰阵法 (V3.0)
                </h1>
                <p class="text-sm md:text-base text-gray-500 dark:text-gray-400 mt-2">实战策略指标与全景损益监控</p>
            </div>
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                <span id="themeIcon">🌙</span>
            </button>
        </div>

        <!-- Strategy Selector -->
        <div class="mb-6">
            <select id="tickerSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full md:w-64 p-2.5">
                <option value="MU">MU (Micron Technology)</option>
                <option value="LULU">LULU (Lululemon)</option>
            </select>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Core Metrics Cards -->
            <div class="lg:col-span-1 space-y-6">
                <div id="metricsPanel" class="grid grid-cols-2 lg:grid-cols-1 gap-4"></div>
            </div>

            <!-- Charts Section -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 h-96">
                    <h3 class="text-lg font-bold mb-2">期权到期损益曲线 (Payoff Chart)</h3>
                    <div id="payoffChart" class="w-full h-full pb-6"></div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 h-64">
                    <h3 class="text-lg font-bold mb-2">IV 热力状态 (简易版)</h3>
                    <div id="ivChart" class="w-full h-full pb-6"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
